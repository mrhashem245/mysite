<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mr HasHeM</title>

<meta name="description" content="Mr HasHeM Official Music Artist Website">
<meta name="keywords" content="Mr HasHeM, music artist, Bangladesh singer">
<meta name="author" content="Mr HasHeM">

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #89f7fe, #66a6ff);
    color: white;
    text-align: center;
}

.container {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

.profile {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid white;
    margin-bottom: 15px;
}

h1 {
    font-size: 40px;
    margin: 10px;
}

p {
    color: #eee;
}

.social-icons a {
    display: inline-block;
    background: white;
    padding: 10px;
    border-radius: 50%;
    margin: 5px;
}

.social-icons a img {
    width: 25px;
}

.about {
    margin-top: 40px;
    max-width: 600px;
    padding: 20px;
}

.about p {
    color: #ddd;
    line-height: 1.6;
}

/* Feedback Form */
form {
    margin-top: 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

form input, form textarea {
    padding: 12px;
    border-radius: 8px;
    border: none;
    outline: none;
    font-size: 14px;
}

form button {
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: #66a6ff;
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

form button:hover {
    background: #4f8ef7;
}
</style>
</head>

<body>

<div class="container">

    <img class="profile" src="https://i.ibb.co/YF5CBfz0/IMG-7258.jpg">

    <h1>Mr HasHeM</h1>
    <p>Official Music Artist</p>

    <div class="social-icons">
        <a href="https://www.facebook.com/Mr.hashem07" target="_blank">
            <img src="https://cdn-icons-png.flaticon.com/512/733/733547.png">
        </a>

        <a href="http://www.youtube.com/channel/UC2xWIe-S9aPLxLPmNWiUwwA" target="_blank">
            <img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png">
        </a>

        <a href="https://open.spotify.com/artist/04kyzP90UhIvb5HhQWQAEk" target="_blank">
            <img src="https://cdn-icons-png.flaticon.com/512/2111/2111624.png">
        </a>

        <a href="https://music.apple.com/gb/artist/mr-hashem/1633140591" target="_blank">
            <img src="https://cdn-icons-png.flaticon.com/512/731/731985.png">
        </a>
    </div>

    <div class="about">
        <h2>About Me</h2>
        <p>
            I am Mr HasHeM, a music artist from Bangladesh. I create and share music across different platforms including Facebook, YouTube, Spotify and Apple Music.
        </p>

        <!-- FEEDBACK FORM -->
        <h2>Feedback</h2>

        <form>
            <input type="text" placeholder="Full Name" required>
            <input type="email" placeholder="Email Address" required>
            <textarea placeholder="Write your feedback..." rows="4" required></textarea>
            <button type="submit">Send</button>
        </form>

    </div>

</div>

</body>
</html>
